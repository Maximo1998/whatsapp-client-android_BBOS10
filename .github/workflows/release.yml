name: Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: "Blackberry Messenger ${{ steps.version.outputs.version }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update server version.json
        env:
          SERVER_TOKEN: ${{ secrets.SERVER_REPO_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          APK_URL="https://github.com/${REPO}/releases/download/v${VERSION}/app-debug.apk"

          # SHA actual de version.json en la rama improved del servidor
          SHA=$(curl -s \
            -H "Authorization: token $SERVER_TOKEN" \
            "https://api.github.com/repos/Maximo1998/whatsapp-server-improved/contents/version.json?ref=improved" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          CONTENT=$(printf '{"version":"%s","apk_url":"%s"}' "$VERSION" "$APK_URL" | base64 -w 0)

          RESULT=$(curl -s -X PUT \
            -H "Authorization: token $SERVER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/Maximo1998/whatsapp-server-improved/contents/version.json" \
            -d "{\"message\":\"release: bump Android app to v${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\",\"branch\":\"improved\"}")

          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Updated:', d.get('content',{}).get('name', d.get('message','?')))"
